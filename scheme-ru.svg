<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title  { fill: #e6edf3; font-size: 26px; font-weight: 700; }
      .sub    { fill: #8b949e; font-size: 14px; }
      .node-t { font-size: 17px; font-weight: 700; }
      .node-s { font-size: 12px; }
      .lbl    { fill: #8b949e; font-size: 12px; font-weight: 600; }
      .note-t { fill: #e6edf3; font-size: 14px; font-weight: 700; }
      .note-s { fill: #8b949e; font-size: 13px; }
    </style>
  </defs>

  <rect width="1000" height="520" rx="10" fill="#0d1117"/>

  <text x="500" y="46" text-anchor="middle" class="title">Caddy + Xray · CDN Bypass</text>
  <text x="500" y="72" text-anchor="middle" class="sub">Обход белых списков через CDN российских провайдеров (Timeweb / Beget)</text>

  <!-- Client -->
  <rect x="70" y="130" width="160" height="80" rx="14" fill="#1a3a5c" stroke="#388bfd" stroke-width="1"/>
  <text x="150" y="166" text-anchor="middle" class="node-t" fill="#79c0ff">Клиент</text>
  <text x="150" y="188" text-anchor="middle" class="node-s" fill="#58a6ff">телефон / ПК · Xray</text>

  <!-- CDN -->
  <rect x="300" y="130" width="160" height="80" rx="14" fill="#0d3b2e" stroke="#2ea043" stroke-width="1"/>
  <text x="380" y="166" text-anchor="middle" class="node-t" fill="#56d364">CDN</text>
  <text x="380" y="188" text-anchor="middle" class="node-s" fill="#3fb950">Timeweb / Beget</text>

  <!-- Caddy -->
  <rect x="540" y="130" width="160" height="80" rx="14" fill="#3d2e00" stroke="#d29922" stroke-width="1"/>
  <text x="620" y="166" text-anchor="middle" class="node-t" fill="#e3b341">Caddy</text>
  <text x="620" y="188" text-anchor="middle" class="node-s" fill="#d29922">:443 · TLS · node</text>

  <!-- Xray -->
  <rect x="780" y="130" width="160" height="80" rx="14" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="860" y="166" text-anchor="middle" class="node-t" fill="#bc8cff">Xray</text>
  <text x="860" y="188" text-anchor="middle" class="node-s" fill="#a371f7">localhost:PORT</text>

  <!-- Internet -->
  <rect x="780" y="370" width="160" height="70" rx="14" fill="#21262d" stroke="#484f58" stroke-width="1"/>
  <text x="860" y="412" text-anchor="middle" class="node-t" fill="#c9d1d9">Интернет</text>

  <!-- arrows -->
  <line x1="230" y1="170" x2="294" y2="170" stroke="#388bfd" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="170" x2="534" y2="170" stroke="#2ea043" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="170" x2="774" y2="170" stroke="#d29922" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="860" y1="210" x2="860" y2="364" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="262" y="156" text-anchor="middle" class="lbl">VLESS/TLS</text>
  <text x="497" y="156" text-anchor="middle" class="lbl">HTTPS</text>
  <text x="737" y="156" text-anchor="middle" class="lbl">/xhttp/*</text>
  <text x="878" y="296" class="lbl">freedom out</text>

  <!-- note -->
  <rect x="40" y="300" width="700" height="180" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="64" y="332" class="note-t">Как это видит провайдер</text>
  <text x="64" y="360" class="note-s">Обычный HTTPS-запрос к разрешённому CDN. SNI = домен CDN из белого списка.</text>
  <text x="64" y="384" class="note-s">Пакет проходит фильтр. Внутри TLS — туннель Xray, расшифровать нельзя.</text>
  <text x="64" y="416" class="note-s">Транспорт XHTTP эмулирует HTTP-обмен — CDN пропускает как веб-трафик.</text>
  <text x="64" y="440" class="note-s">Кэш CDN включён, но /xhttp отдаёт no-store — туннель не кэшируется.</text>
</svg>
